# Image Catalog — Travel Guides
# ============================================================
# Schema v1.0 — exportable to any relational or document DB
#
# Campos:
#   id            → clave única: "{source}-{source_id}"
#   type          → "pexels" | "own" | "s3"
#   source_id     → ID en el sistema origen (ej. ID numérico de Pexels)
#   urls.cdn      → URL CDN con placeholders {w} y {h}
#   urls.local    → ruta relativa dentro de _images/ (null hasta descargar)
#   urls.s3       → URL S3 (null hasta subir)
#   place         → jerarquía geográfica completa
#   gps           → lat/lng WGS84 (6 decimales), accuracy: exact|approx|region
#   tags          → array de términos para búsqueda full-text
#   usage_types   → usos válidos: hero|day-header|accordion-thumb|accordion-img|og-image
#   verified      → true si la URL fue verificada con curl (tamaño >5 KB)
#   size_bytes    → tamaño a w=800&h=450 (referencia de verificación)
#
# Para exportar a JSON:
#   python3 -c "import yaml,json,sys; print(json.dumps(yaml.safe_load(open('catalog.yaml'))['images'], indent=2))"
#
# Para exportar a SQL (PostgreSQL jsonb):
#   python3 export_to_db.py  (ver scripts/)
# ============================================================

